<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#eaddff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bgGradient)"/>
  
  <!-- Inner shadow effect -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="rgba(255,255,255,0.1)"/>
  
  <!-- 6561 Text -->
  <text x="256" y="320" 
        font-family="Arial Black, Roboto, sans-serif" 
        font-size="200" 
        font-weight="900" 
        fill="url(#textGradient)"
        text-anchor="middle"
        dominant-baseline="middle"
        stroke="rgba(0,0,0,0.2)"
        stroke-width="4">6561</text>
  
  <!-- Decorative small circles representing game tiles -->
  <circle cx="120" cy="140" r="24" fill="rgba(255,255,255,0.3)"/>
  <circle cx="392" cy="140" r="24" fill="rgba(255,255,255,0.3)"/>
  <circle cx="256" cy="420" r="20" fill="rgba(255,255,255,0.25)"/>
</svg>
