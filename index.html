<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#776e65">
    <title>6561</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="www/styles.css">
</head>
<body>
    <div class="game-container">
        <h1>6561</h1>
        <div>
            <div id="score">0</div>
            <div id="best">0</div>
        </div>
        <div id="game">
            <div id="overlay-win" class="overlay">
                <h2>You Win!</h2>
                <p>Reached 6561!</p>
                <button class="restart-btn" id="btn-keep-playing">Keep Playing</button>
                <button class="restart-btn" id="btn-restart-win">Restart</button>
            </div>
            <div id="overlay-gameover" class="overlay">
                <h2>Game Over!</h2>
                <p>Try again?</p>
                <button class="restart-btn" id="btn-restart-lose">Restart</button>
            </div>
        </div>
        <div id="instructions">
            Use arrow keys / WASD or swipe<br>
            Merge three identical numbers (3 threes→9, 3 nines→27, ..., up to 6561)<br>
            Reach 6561 to win! Continue for higher scores
        </div>
    </div>

    <script src="www/game.js"></script>
</body>
</html>
